{{ define "layout" }}
<!doctype html>
<title>¿Who Knows?</title>
<link rel="stylesheet" type="text/css" href="/static/style.css">
<div class="page">
    <div class="navigation">
    <nav>
        <h1><a id="nav-logo" href="/search">¿Who Knows?</a></h1>
        {{ if .User }}
        <a id="nav-logout" href="/logout">Log out [{{ .User }}]</a>
        {{ else }}
        <a id="nav-login" href="/login">Log in</a>
        <a id="nav-register" href="/register">Register</a>
        {{ end }}
    </nav>
    </div>
    {{ if .Flash }}
        <ul class="flashes">
            <li>{{ .Flash }}</li>
        </ul>
    {{ end }}
    <div class="body">
    {{ template "content" . }}
    </div>
    <div class="footer">
        <span>¿Who Knows? &copy; 2009</span>
        <a href="/about">About</a>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const path = window.location.pathname;
        const loginLink = document.getElementById("nav-login");
        const registerLink = document.getElementById("nav-register");

        if (loginLink && path === "/login") {
            loginLink.classList.add("is-active");
            loginLink.setAttribute("aria-current", "page");
        }

        if (registerLink && path === "/register") {
            registerLink.classList.add("is-active");
            registerLink.setAttribute("aria-current", "page");
        }
    });
</script>
{{ end }}
