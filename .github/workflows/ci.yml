name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  # Go Backend CI - Production Implementation
  go-ci:
    name: Go Build & Tests
    runs-on: ubuntu-latest

    # Set working directory to where go.mod is located
    defaults:
      run:
        working-directory: implementations/go

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Install dependencies
        run: go mod download all

      - name: Verify dependencies
        run: go mod verify

      # Run go vet on backend directory (relative to implementations/go)
      - name: Run go vet
        run: go vet ./backend/...

      # Check Go code formatting in backend directory
      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l backend | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Run 'gofmt -s -w backend'"
            gofmt -s -l backend
            exit 1
          fi

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.61.0

      # Run linter on backend directory
      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run ./backend/... --timeout=5m

      # Build all Go packages in backend directory
      - name: Build Go application
        run: go build -v ./backend/...

      # Run tests in backend directory with race detection
      - name: Run Go tests
        run: go test -v -race -coverprofile=coverage.out ./backend/...
        continue-on-error: true

      - name: Display Go test coverage
        if: success()
        run: go tool cover -func=coverage.out

  # Database Schema Validation
  database-validation:
    name: Database Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate SQL schema
        run: |
          if [ -f implementations/python/schema.sql ]; then
            echo "✅ Schema file exists"
            sudo apt-get update && sudo apt-get install -y sqlite3
            sqlite3 test.db < implementations/python/schema.sql
            echo "✅ Schema is valid SQL"
            rm test.db
          else
            echo "⚠️ No schema.sql found"
          fi

  # Quality Gate - All checks must pass before merge
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [go-ci, database-validation]

    steps:
      - name: All checks passed
        run: |
          echo "All CI checks passed!"
          echo "✅ Go build successful"
          echo "✅ Code quality verified"
          echo "✅ Database schema valid"
          echo "Ready to merge! "
