name: CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  go-ci:
    name: Go Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/go

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: whoknows_test
          POSTGRES_USER: whoknows
          POSTGRES_PASSWORD: whoknows
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://whoknows:whoknows@localhost:5432/whoknows_test?sslmode=disable

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false
      - name: Install dependencies
        run: go mod download all
      - name: Verify dependencies
        run: go mod verify
      - name: Run go vet
        run: go vet ./backend/...
      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l backend | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Run 'gofmt -s -w backend'"
            gofmt -s -l backend
            exit 1
          fi
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin latest
      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run ./backend/... --timeout=5m
      - name: Build Go application
        run: go build -v -o whoknows-server ./backend/...
      - name: Run Go tests
        run: go test -v -race -coverprofile=coverage.out ./backend/...
      - name: Display Go test coverage
        if: success()
        run: go tool cover -func=coverage.out



      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          # forces scanner to use root dir where the prop file is defined
          projectBaseDir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    


  database-validation:
    name: Database Schema Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: whoknows_test
          POSTGRES_USER: whoknows
          POSTGRES_PASSWORD: whoknows
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Validate PostgreSQL schema
        run: |
          if [ -f implementations/go/schema.sql ]; then
            echo "✅ Schema file exists"
            PGPASSWORD=whoknows psql -h localhost -U whoknows -d whoknows_test -f implementations/go/schema.sql
            echo "✅ Schema is valid SQL"
          else
            echo "⚠️ No schema.sql found"
          fi

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [go-ci, database-validation]
    steps:
      - name: All checks passed
        run: |
          echo "All CI checks passed!"
          echo "✅ Go build successful"
          echo "✅ Code quality verified"
          echo "✅ Database schema valid"
          echo "Ready to merge!"
