name: CD Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=ghcr.io/${OWNER_LC}/whoknows-go" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: implementations/go/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_name }}:latest
            ${{ steps.vars.outputs.image_name }}:${{ github.sha }}

  deploy:
    name: Deploy on VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy production compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml,implementations/go/scripts/deploy_compose.sh
          target: /tmp/whoknows-deploy
          overwrite: true

      - name: Deploy with Docker Compose on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            sudo mkdir -p /opt/whoknows
            sudo mkdir -p /opt/whoknows/implementations/go/scripts

            sudo cp -f /tmp/whoknows-deploy/docker-compose.prod.yml /opt/whoknows/docker-compose.prod.yml
            sudo cp -f /tmp/whoknows-deploy/implementations/go/scripts/deploy_compose.sh /opt/whoknows/implementations/go/scripts/deploy_compose.sh

            cd /opt/whoknows
            sudo mv -f docker-compose.prod.yml docker-compose.yml

            sudo chmod +x /opt/whoknows/implementations/go/scripts/deploy_compose.sh

            export GHCR_USER="${{ secrets.GHCR_USER }}"
            export GHCR_PAT="${{ secrets.GHCR_PAT }}"

            bash /opt/whoknows/implementations/go/scripts/deploy_compose.sh \
              "${{ needs.build-and-push.outputs.image_name }}" \
              "${{ github.sha }}"

            sudo docker image prune -f
