name: CD Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image name
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=ghcr.io/${OWNER_LC}/whoknows-go" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: implementations/go/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_name }}:latest
            ${{ steps.vars.outputs.image_name }}:${{ github.sha }}

  deploy:
    name: Deploy on VM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy production compose and scripts to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml,implementations/go/scripts/deploy_compose.sh
          target: /opt/whoknows-deploy
          overwrite: true

      - name: Deploy with Docker Compose on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            sudo mkdir -p /opt/whoknows
            sudo mkdir -p /opt/whoknows/implementations/go/scripts

            sudo cp -f /opt/whoknows-deploy/docker-compose.prod.yml /opt/whoknows/docker-compose.prod.yml
            sudo cp -f /opt/whoknows-deploy/implementations/go/scripts/deploy_compose.sh /opt/whoknows/implementations/go/scripts/deploy_compose.sh

            cd /opt/whoknows
            sudo mv -f docker-compose.prod.yml docker-compose.yml

            sudo chmod +x /opt/whoknows/implementations/go/scripts/deploy_compose.sh

            export GHCR_USER="${{ secrets.GHCR_USER }}"
            export GHCR_PAT="${{ secrets.GHCR_PAT }}"

            bash /opt/whoknows/implementations/go/scripts/deploy_compose.sh \
              "${{ needs.build-and-push.outputs.image_name }}" \
              "${{ github.sha }}"
            echo "=== Restarting nginx to refresh DNS ==="
            sudo docker restart tls-nginx-1
            sudo docker image prune -f
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app to come up..."
          for i in $(seq 1 12); do
            if curl -sf https://syntax-reborndev.com/health > /dev/null; then
              echo "App is up!"
              exit 0
            fi
            echo "Attempt $i/12 – retrying in 10s..."
            sleep 10
          done
          echo "App did not respond after 2 minutes"
          exit 1

      - name: Write smoke test config
        run: |
          cat > tools/endpoint-sim/config.smoke.json << 'EOF'
          {
            "report_every_s": 15,
            "http": {
              "bot_count": 3,
              "interval_ms": 2000,
              "endpoints": [
                { "method": "GET", "url": "https://syntax-reborndev.com/health" },
                { "method": "GET", "url": "https://syntax-reborndev.com/api/search?q=devops&language=en" },
                { "method": "GET", "url": "https://syntax-reborndev.com/about" }
              ]
            },
            "db": { "driver": "postgres", "dsn": "", "bot_count": 0, "interval_ms": 5000 },
            "user_bots": { "enabled": false, "base_url": "", "credentials": [], "normal": { "count": 0, "searches_per_session": 0, "pause_ms": 0, "loop_delay_ms": 0 }, "heavy": { "count": 0, "searches_per_session": 0, "pause_ms": 0, "loop_delay_ms": 0 }, "session": { "count": 0, "loop_delay_ms": 0 } },
            "load_test": { "enabled": false, "urls": [], "concurrent": 0, "total_requests": 0 }
          }
          EOF

      - name: Run smoke test (60s)
        run: |
          cd tools/endpoint-sim
          go mod tidy
          timeout 60 go run main.go config.smoke.json || true

      - name: Verify health endpoint
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://syntax-reborndev.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed – HTTP $STATUS"