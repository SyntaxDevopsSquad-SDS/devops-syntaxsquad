---
- name: Setup WhoKnows VM
  hosts: whoknows
  become: true

  tasks:
    - name: Wait for VM to be ready
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Opret 4GB swap fil
      command: fallocate -l 4G /swapfile
      args:
        creates: /swapfile

    - name: Sæt korrekte rettigheder på swap fil
      file:
        path: /swapfile
        mode: "0600"

    - name: Formater swap fil
      command: mkswap /swapfile
      args:
        creates: /proc/swaps
      register: mkswap_result
      changed_when: mkswap_result.rc == 0

    - name: Aktiver swap
      command: swapon /swapfile
      failed_when: false
      changed_when: false

    - name: Tilføj swap til /etc/fstab (persistent)
      lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        state: present

    - name: Sæt swappiness til 10
      sysctl:
        name: vm.swappiness
        value: "10"
        state: present
        sysctl_set: yes

    - name: Install packages
      apt:
        name:
          - fail2ban
          - ufw
          - git
          - nginx
        state: present

    - name: Start og enable fail2ban
      service:
        name: fail2ban
        state: started
        enabled: yes

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Install docker-compose-plugin (v2)
      apt:
        name: docker-compose-plugin
        state: present

    - name: Tilføj adminuser til docker gruppe
      user:
        name: adminuser
        groups: docker
        append: yes

    - name: UFW - tillad SSH
      ufw:
        rule: allow
        port: "22"

    - name: UFW - tillad 8080
      ufw:
        rule: allow
        port: "8080"

    - name: Start og enable nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: UFW - tillad HTTP
      ufw:
        rule: allow
        port: "80"

    - name: UFW - enable
      ufw:
        state: enabled
        policy: deny

    - name: Create postgres disk mount point
      file:
        path: /opt/whoknows/pgdisk
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check if data disk is formatted
      command: blkid /dev/disk/azure/scsi1/lun10
      register: blkid_result
      failed_when: false
      changed_when: false

    - name: Format data disk (only if not already formatted)
      filesystem:
        fstype: ext4
        dev: /dev/disk/azure/scsi1/lun10
      when: blkid_result.rc != 0

    - name: Mount data disk
      mount:
        path: /opt/whoknows/pgdisk
        src: /dev/disk/azure/scsi1/lun10
        fstype: ext4
        opts: defaults,nofail
        state: mounted

    - name: Opret postgres data undermappe på disken
      file:
        path: /opt/whoknows/pgdisk/data
        state: directory
        owner: 999
        group: 999
        mode: "0700"

    - name: Opret /opt/whoknows mappe
      file:
        path: /opt/whoknows
        state: directory
        owner: adminuser
        group: adminuser
        mode: "0755"

    - name: Kopiér docker-compose fil til server
      copy:
        src: ../../docker-compose.prod.yml
        dest: /opt/whoknows/docker-compose.yml
        owner: adminuser
        group: adminuser
        mode: "0644"

    - name: Kopiér .env fil til server
      copy:
        src: ../../.env
        dest: /opt/whoknows/.env
        owner: adminuser
        group: adminuser
        mode: "0600"

    - name: Konfigurer Nginx som reverse proxy
      copy:
        dest: /etc/nginx/sites-available/whoknows
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://localhost:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
          }
        mode: "0644"

    - name: Aktiver Nginx site
      file:
        src: /etc/nginx/sites-available/whoknows
        dest: /etc/nginx/sites-enabled/whoknows
        state: link

    - name: Fjern default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Genstart Nginx
      service:
        name: nginx
        state: restarted

    - name: Log ind på GHCR
      shell: |
        source /opt/whoknows/.env
        echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
      args:
        executable: /bin/bash

    - name: Start Docker Compose
      shell: docker compose up -d
      args:
        chdir: /opt/whoknows