apiVersion: 1

groups:
  - orgId: 1
    name: WhoKnows Alerts
    folder: WhoKnows
    interval: 1m
    rules:

      # ─── App nede ────────────────────────────────────────────────────────────
      - uid: whoknows-app-down
        title: WhoKnows App Down
        condition: B
        for: 2m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: "WhoKnows app er nede"
          description: "Prometheus kan ikke scrape metrics fra appen. App er sandsynligvis nede."
        labels:
          severity: critical
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: up{job="whoknows-app"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last

      # ─── Høj HTTP fejlrate (5xx) ─────────────────────────────────────────────
      - uid: whoknows-high-error-rate
        title: High HTTP Error Rate
        condition: B
        for: 2m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: "Høj HTTP fejlrate (5xx)"
          description: "Mere end 5% af requests fejler med 5xx status."
        labels:
          severity: warning
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                rate(whoknows_http_requests_total{status=~"5.."}[5m])
                /
                rate(whoknows_http_requests_total[5m]) * 100
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last

      # ─── Høj login fejlrate ───────────────────────────────────────────────────
      - uid: whoknows-high-login-failure
        title: High Login Failure Rate
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: "Høj login fejlrate"
          description: "Mere end 50% af login-forsøg fejler — login-flowet er sandsynligvis brudt."
        labels:
          severity: critical
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                rate(whoknows_login_attempts_total{outcome="failure"}[5m])
                /
                (rate(whoknows_login_attempts_total[5m]) + 0.001) * 100
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [50]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
